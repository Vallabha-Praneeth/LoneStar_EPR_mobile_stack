# 🔗 Links:
# Source file: https://github.com/obytes/react-native-template-obytes/blob/master/.github/actions/setup-jdk-generate-apk/action.yml
# Composite actions docs: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

# ✍️ Description:
# Sets up JDK, Gradle, runs expo prebuild, restores the CMake native-compile
# cache, then builds the release APK. The CMake cache is the big win for
# Android CI — on a cold run, compiling the native bits of reanimated,
# gesture-handler, worklets, nitro, and rive takes ~15–20 min. We restore
# those outputs from `android/app/.cxx` + `build/intermediates/cxx` keyed
# on the ABI plus the JS deps hash, so warm runs skip the native compile.
#
# Cache key includes `ORG_GRADLE_PROJECT_reactNativeArchitectures` because
# changing the target ABI invalidates every CMake output.
#
# On success, APK is at `./android/app/build/outputs/apk/release/app-release.apk`.

# 👀 Example usage:
#       - name : 📦 Set Up JDK + Generate Test APK
#         uses: ./.github/actions/setup-jdk-generate-apk
#         with:
#           APP_ENV: 'staging'

name: 'Setup  JDK + GRADLE + Generate APK'
description: 'Setup  JDK + GRADLE + Generate APK'
inputs:
  APP_ENV:
    description: 'APP_ENV (one of): development, staging, production'
    required: true
    default: staging

runs:
  using: composite
  steps:
    - name: Set Up JDK
      uses: actions/setup-java@v3
      with:
        distribution: zulu # See 'Supported distributions' for available options
        java-version: '17'
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Run Expo Prebuild
      run: pnpm prebuild:${{ inputs.APP_ENV }}
      shell: bash
      env:
        EXPO_NO_DOTENV: '1'
        APP_ENV: ${{ inputs.APP_ENV }}
        CI: 'true'

    - name: Cache CMake native build outputs
      uses: actions/cache@v4
      with:
        path: |
          android/app/.cxx
          android/app/build/intermediates/cxx
        key: android-cmake-v1-${{ runner.os }}-${{ env.ORG_GRADLE_PROJECT_reactNativeArchitectures || 'default' }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'app.config.ts', 'env.ts') }}
        restore-keys: |
          android-cmake-v1-${{ runner.os }}-${{ env.ORG_GRADLE_PROJECT_reactNativeArchitectures || 'default' }}-

    - name: Assemble Release APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleRelease --no-daemon --stacktrace
        cd ..
      shell: bash
      env:
        EXPO_NO_DOTENV: '1'
        APP_ENV: ${{ inputs.APP_ENV }}
        CI: 'true'
