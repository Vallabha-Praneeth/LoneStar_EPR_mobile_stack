version: 2
updates:
  # npm dependencies (React Native / Expo packages)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # Expo SDK upgrades require coordinated native rebuild — do manually.
      - dependency-name: expo
        update-types: ['version-update:semver-major']
      - dependency-name: react-native
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
