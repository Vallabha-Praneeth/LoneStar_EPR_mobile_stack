appId: ${APP_ID}
tags:
  - smoke
---
# Minimum-viable smoke test for the Maestro Cloud pipeline.
#
# APP_ID, USERNAME, PASSWORD MUST be provided by the caller — no flow-header
# defaults, because Maestro's flow-header `env:` takes precedence over the
# CLI's `-e KEY=VALUE` input. Hardcoded defaults would shadow the workflow's
# platform-correct values (iOS bundle ID uses hyphens, Android package uses
# underscores) and would also commit test credentials to version control.
#
# Run locally with:
#   maestro test \
#     -e APP_ID=com.adtruck_driver_native.preview \
#     -e USERNAME=driver-e2e \
#     -e PASSWORD=<e2e-password> \
#     .maestro/driver/login-smoke.yaml
#
# Login steps are INLINED (not delegated to ../utils/driver-login.yaml)
# because Maestro sub-flow `env:` header defaults OVERRIDE parent env —
# driver-login.yaml has `USERNAME: driver1` as a dev default, which would
# shadow the e2e creds passed from the workflow. Inlining keeps env
# precedence single-scoped to this file.

- launchApp:
    appId: ${APP_ID}
    clearState: true
    arguments:
      isE2E: 'true'

- extendedWaitUntil:
    visible:
      id: login-button
    timeout: 30000

- tapOn:
    id: username-input
- inputText: ${USERNAME}
# Hide keyboard before tapping password-input. On Android the soft keyboard
# covers the password field, so Maestro reports "Element not found" even
# though the testID is present. iOS doesn't need this but running it is a no-op.
- runFlow: ../utils/hide-keyboard.yaml
- tapOn:
    id: password-input
- inputText: ${PASSWORD}
- runFlow: ../utils/hide-keyboard.yaml
- tapOn:
    id: login-button

# iOS may show a "Save Password?" keychain sheet after login — dismiss if present.
- runFlow:
    when:
      visible: Not Now
    commands:
      - tapOn: Not Now

# Login triggers: RPC get_auth_email_by_username → signInWithPassword → profile fetch → route.
# 30s accommodates network latency on Maestro Cloud simulators.
- extendedWaitUntil:
    visible:
      id: driver-campaign-screen
    timeout: 30000
