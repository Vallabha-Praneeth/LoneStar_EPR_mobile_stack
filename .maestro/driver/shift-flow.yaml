appId: ${APP_ID}
env:
  APP_ID: com.adtruck-driver-native.development
  USERNAME: driver1
  PASSWORD: DriverPass123!
---
# Full driver shift happy path:
# launchApp(clearState, isE2E) → login → start shift → upload photo → end shift → sign out
#
# Launch notes:
# - launchApp with clearState: true wipes app state (MMKV session gone → fresh login).
# - arguments: { isE2E: "true" } is read by react-native-launch-arguments in login-form.tsx
#   to disable secureTextEntry, allowing Maestro/XCTest to fire onChangeText on the
#   password field (Maestro issue #1061 — AutoFill popup blocks typeText on secure fields).
# - In all non-E2E builds the password field is always secure.
#
# MMKV is empty after clearState → hydrateAuth → status:signOut → login screen.
# The splash screen appears frozen on iOS 26 beta (expo-splash-screen compat bug)
# but the accessibility tree is fully populated, so Maestro can interact normally.

- launchApp:
    appId: ${APP_ID}
    clearState: true
    arguments:
      isE2E: 'true'

# After clearState the dev-client has no saved Metro URL — send the deep link
# to reconnect. launchApp is still needed first to inject isE2E before JS starts.
- openLink: 'exp+obytesapp://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081%3FdisableOnboarding%3D1'

# Wait for the JS bundle to download and hydrateAuth() to settle.
- extendedWaitUntil:
    visible:
      id: login-button
    timeout: 30000

# Login — always required after clearState since MMKV session is wiped.
- assertVisible:
    id: login-button
- runFlow: ../utils/driver-login.yaml

# Campaign screen — handle case where a previous unclosed shift exists in the DB.
# start-shift-button visible → no active shift. If not visible → shift already active.
- runFlow:
    when:
      visible:
        id: start-shift-button
    commands:
      - tapOn:
          id: start-shift-button

# Confirm shift is active (end-shift-button is now visible)
- assertVisible:
    id: end-shift-button

# Navigate to upload screen
- tapOn:
    id: upload-photo-button
- assertVisible: Upload Photo

# Seed a photo into the simulator library before opening the picker.
# addMedia is Maestro's first-class API for this — no coordinate taps needed.
- addMedia:
    - ../test-assets/sample-photo.jpg

- tapOn:
    id: gallery-button

# Grant photo library permission if the system dialog appears (first run after clearState).
- runFlow:
    when:
      visible: Allow Full Access
    commands:
      - tapOn: Allow Full Access

# Select the first photo — optional: true handles iOS 17/18 element ID differences.
- tapOn:
    id: PXGGridLayout-Info
    index: 0
    optional: true
- tapOn:
    text: 'Photo, .*'
    index: 0
    optional: true

# Photo preview loaded — scroll down to reveal submit button below the fold
- scroll
# Submit the photo
- assertVisible:
    id: submit-photo-button
- tapOn:
    id: submit-photo-button

# Upload success screen
- assertVisible: Photo Submitted!
- tapOn:
    id: back-to-campaign-button

# Back on campaign screen — shift still active
- assertVisible:
    id: end-shift-button

# End shift — triggers optimistic signOut (local state cleared immediately),
# then Supabase session revoked in background. Navigation to login is instant.
- tapOn:
    id: end-shift-button

- assertVisible:
    id: login-button
