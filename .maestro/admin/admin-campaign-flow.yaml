appId: ${APP_ID}
env:
  APP_ID: com.adtruck-driver-native.development
  APP_ID_ANDROID: com.adtruck_driver_native.development
  USERNAME: admin@adtruck.com
  PASSWORD: mawqex-rYsneq-kynja5
---
# Admin campaign flow: login → campaign list → campaign detail → tabs → sign out
# Cross-platform: iOS (iPhone 16e) + Android (Pixel 7 API 36)

# ── Launch ──────────────────────────────────────────────────────────
# iOS launch — clearState wipes MMKV, deep link reconnects to Metro
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          appId: ${APP_ID}
          clearState: true
      - openLink: 'exp+adtruck-driver-native://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081%3FdisableOnboarding%3D1'

# Android launch — clearState + stop + deep link to set Metro URL
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp:
          appId: ${APP_ID_ANDROID}
          clearState: true
      - stopApp:
          appId: ${APP_ID_ANDROID}
      - openLink: 'exp+adtruck-driver-native://expo-development-client/?url=http%3A%2F%2F10.0.2.2%3A8081%3FdisableOnboarding%3D1'
      # Dismiss dev menu overlay if it appears
      - runFlow:
          when:
            visible: Continue
          commands:
            - tapOn: Continue

# Wait for JS bundle + auth hydration
- extendedWaitUntil:
    visible:
      id: login-button
    timeout: 30000
- assertVisible:
    id: login-button

# ── Login as admin ──────────────────────────────────────────────────
- runFlow: ../utils/admin-login.yaml

# Campaign list screen — verify we're logged in
- assertVisible:
    id: sign-out-button

# ── Campaign detail ─────────────────────────────────────────────────
- tapOn:
    text: 'Acme Corp.*'
    index: 0

- extendedWaitUntil:
    visible: Client
    timeout: 10000
- assertVisible: Client
- assertVisible: Driver

# Go back to campaign list
- tapOn:
    id: back-button

# ── Navigate admin tabs ─────────────────────────────────────────────
# Native tab labels aren't matchable by Maestro on iOS.
# Use point-based coordinates per platform.
# iOS (iPhone 16e, 393pt): Campaigns≈49, Create≈147, Reports≈245, Users≈341  y≈798
# Android (Pixel 7, 1080x2400@420dpi): Campaigns≈135, Create≈405, Reports≈675, Users≈945  y≈2310
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          point: "245,798"
      - extendedWaitUntil:
          visible:
            id: reports-screen
          timeout: 10000
      - tapOn:
          point: "341,798"
      - extendedWaitUntil:
          visible:
            id: users-screen
          timeout: 10000
      - tapOn:
          point: "49,798"
      - extendedWaitUntil:
          visible:
            id: sign-out-button
          timeout: 5000

- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          point: "675,2310"
      - extendedWaitUntil:
          visible:
            id: reports-screen
          timeout: 10000
      - tapOn:
          point: "945,2310"
      - extendedWaitUntil:
          visible:
            id: users-screen
          timeout: 10000
      - tapOn:
          point: "135,2310"
      - extendedWaitUntil:
          visible:
            id: sign-out-button
          timeout: 5000

# ── Sign out ────────────────────────────────────────────────────────
- tapOn:
    id: sign-out-button

# Verify we're back on login screen
- extendedWaitUntil:
    visible:
      id: login-button
    timeout: 10000
- assertVisible:
    id: login-button
